name: Terraform Pipeline
on:
  pull_request:
    branches:
      - main
env:
  ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
  ARM_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
  ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
  ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
  BACKEND_RESOURCE_GROUP: terraformstate-Gg
  BACKEND_STORAGE_ACCOUNT: tfstate12345678
  BACKEND_CONTAINER: tfstate
  BACKEND_KEY: aks.tfstate
  
jobs:
  # ==========================================================
  # Job 1 - Terraform Plan
  # ==========================================================
  plan:
    name: Terraform Plan
    runs-on: self-hosted
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          clean: true

      - name: Clean Terraform Cache
        run: rm -rf "$GITHUB_WORKSPACE/.terraform"

      - name: Verify Terraform Installation
        working-directory: ${{ github.workspace }}
        run: terraform version

      - name: Debug secret presence
        run: |
          if [ -z "$ARM_CLIENT_ID" ]; then echo "ARM_CLIENT_ID is EMPTY"; else echo "ARM_CLIENT_ID is set"; fi
          if [ -z "$ARM_CLIENT_SECRET" ]; then echo "ARM_CLIENT_SECRET is EMPTY"; else echo "ARM_CLIENT_SECRET is set"; fi
          if [ -z "$ARM_TENANT_ID" ]; then echo "ARM_TENANT_ID is EMPTY"; else echo "ARM_TENANT_ID is set"; fi
          if [ -z "$ARM_SUBSCRIPTION_ID" ]; then echo "ARM_SUBSCRIPTION_ID is EMPTY"; else echo "ARM_SUBSCRIPTION_ID is set"; fi

      - name: Terraform Init
        working-directory: ${{ github.workspace }}
        run: |
          terraform init \
            -backend-config="resource_group_name=${BACKEND_RESOURCE_GROUP}" \
            -backend-config="storage_account_name=${BACKEND_STORAGE_ACCOUNT}" \
            -backend-config="container_name=${BACKEND_CONTAINER}" \
            -backend-config="key=${BACKEND_KEY}"

      - name: Terraform Validate
        working-directory: ${{ github.workspace }}
        run: terraform validate

      - name: Terraform Plan
        working-directory: ${{ github.workspace }}
        run: terraform plan -input=false -out=tfplan

      - name: Publish Plan Artifact
        uses: actions/upload-artifact@v4
        with:
          name: terraform-plan
          path: ${{ github.workspace }}/tfplan
          retention-days: 5

  # ==========================================================
  # Job 2 - Terraform Apply
  # ==========================================================
  apply:
    name: Apply Infrastructure
    needs: plan
    if: success()
    runs-on: azureagent
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          clean: true

      - name: Clean Terraform Cache
        run: rm -rf "$GITHUB_WORKSPACE/.terraform"

      - name: Download Plan Artifact
        uses: actions/download-artifact@v4
        with:
          name: terraform-plan
          path: ${{ github.workspace }}/terraform-plan

      - name: Verify Terraform Installation
        working-directory: ${{ github.workspace }}
        run: terraform version

      - name: Terraform Init
        working-directory: ${{ github.workspace }}
        run: |
          terraform init \
            -backend-config="resource_group_name=${BACKEND_RESOURCE_GROUP}" \
            -backend-config="storage_account_name=${BACKEND_STORAGE_ACCOUNT}" \
            -backend-config="container_name=${BACKEND_CONTAINER}" \
            -backend-config="key=${BACKEND_KEY}" \
            -backend-config="client_id=${ARM_CLIENT_ID}" \
            -backend-config="client_secret=${ARM_CLIENT_SECRET}" \
            -backend-config="tenant_id=${ARM_TENANT_ID}" \
            -backend-config="subscription_id=${ARM_SUBSCRIPTION_ID}"

      - name: Terraform Apply
        working-directory: ${{ github.workspace }}
        run: terraform apply -input=false "$GITHUB_WORKSPACE/terraform-plan/tfplan"
