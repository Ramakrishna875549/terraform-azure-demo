name: Terraform Pipeline

on:
  pull_request:
    branches:
      - main
	  

env:
  ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
  ARM_CLIENT_SECRET: ${{ secrets.ARM_CLIENT_SECRET }}
  ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
  ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}
  backendResourceGroup: terraformstate-Gg
  backendStorageAccount: tfstate12345678
  backendContainer: tfstate
  backendKey: aks.tfstate

jobs:
  #==========================================================
  # Job 1 - Terraform Plan
  #==========================================================
  Plan:
    name: Terraform Plan
    runs-on: [self-hosted, azureagent]

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          clean: true

      - name: Clean Terraform Cache
        run: rm -rf $GITHUB_WORKSPACE/.terraform

      - name: Verify Terraform Installation
        run: terraform version
        working-directory: ${{ github.workspace }}

      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="resource_group_name=$backendResourceGroup" \
            -backend-config="storage_account_name=$backendStorageAccount" \
            -backend-config="container_name=$backendContainer" \
            -backend-config="key=$backendKey"
        working-directory: ${{ github.workspace }}

      - name: Terraform Validate
        run: terraform validate
        working-directory: ${{ github.workspace }}

      - name: Terraform Plan
        run: terraform plan -out=tfplan
        working-directory: ${{ github.workspace }}

      - name: Publish Plan Artifact
        uses: actions/upload-artifact@v4
        with:
          name: terraform-plan
          path: ${{ github.workspace }}/tfplan

  #==========================================================
  # Job 2 - Terraform Apply
  #==========================================================
  Apply:
    name: Apply Infrastructure
    needs: Plan
    if: success()
    runs-on: [self-hosted, azureagent]
  

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          clean: true

      - name: Clean Terraform Cache
        run: rm -rf $GITHUB_WORKSPACE/.terraform

      - name: Download Plan Artifact
        uses: actions/download-artifact@v4
        with:
          name: terraform-plan
          path: ${{ github.workspace }}/terraform-plan

      - name: Verify Terraform Installation
        run: terraform version
        working-directory: ${{ github.workspace }}

      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="resource_group_name=$backendResourceGroup" \
            -backend-config="storage_account_name=$backendStorageAccount" \
            -backend-config="container_name=$backendContainer" \
            -backend-config="key=$backendKey"
        working-directory: ${{ github.workspace }}

      - name: Terraform Apply
        run: terraform apply -input=false "$GITHUB_WORKSPACE/terraform-plan/tfplan"
        working-directory: ${{ github.workspace }}
